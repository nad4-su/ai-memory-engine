services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: memory-postgres
    environment:
      POSTGRES_DB: memory_engine
      POSTGRES_USER: memory_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"  # 5433 external (avoid conflict with existing postgres)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d memory_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - memory-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.8.1
    container_name: memory-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6335:6333"  # 6335 external (avoid conflict with existing qdrant on 6333/6334)
    restart: unless-stopped
    networks:
      - memory-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: memory-api
    volumes:
      - ./shared:/app/shared:ro
    environment:
      DATABASE_URL: postgresql://memory_user:${POSTGRES_PASSWORD}@postgres:5432/memory_engine
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - memory-network

  # Ingest Service
  ingest-service:
    build: ./ingest-service
    container_name: memory-ingest
    environment:
      DATABASE_URL: postgresql://memory_user:${POSTGRES_PASSWORD}@postgres:5432/memory_engine
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      OBSIDIAN_VAULT_PATH: ${OBSIDIAN_VAULT_PATH:-}
      BOOKMARK_API_URL: ${BOOKMARK_API_URL:-}
      BOOKMARK_API_KEY: ${BOOKMARK_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-/dev/null}:/vault:ro
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - memory-network

  # Profiler Service
  profiler-service:
    build:
      context: .
      dockerfile: profiler-service/Dockerfile
    container_name: memory-profiler
    environment:
      DATABASE_URL: postgresql://memory_user:${POSTGRES_PASSWORD}@postgres:5432/memory_engine
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      PROFILER_CRON: ${PROFILER_CRON:-0 0 * * *}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memory-network

  # Advisor Service
  advisor-service:
    build:
      context: .
      dockerfile: advisor-service/Dockerfile
    container_name: memory-advisor
    environment:
      DATABASE_URL: postgresql://memory_user:${POSTGRES_PASSWORD}@postgres:5432/memory_engine
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      ADVISOR_CRON: ${ADVISOR_CRON:-0 8 * * *}
      ADVISOR_TIMEZONE: ${ADVISOR_TIMEZONE:-Asia/Seoul}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - memory-network

  # Frontend (Nginx)
  frontend:
    build: ./frontend
    container_name: memory-frontend
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - memory-network

volumes:
  postgres-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  memory-network:
    driver: bridge
